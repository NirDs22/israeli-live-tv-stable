name: Channel health

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"
    - cron: "0 23 * * *"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  channel-health:
    runs-on: ubuntu-latest
    env:
      MAIL_CONFIGURED: ${{ secrets.MAIL_SERVER != '' && secrets.MAIL_PORT != '' && secrets.MAIL_USERNAME != '' && secrets.MAIL_PASSWORD != '' && secrets.MAIL_FROM != '' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Continue only near 01:00 Israel time
        id: israel-time
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$(TZ=Asia/Jerusalem date +%H)" = "01" ]; then
            echo "run_checks=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_checks=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        if: steps.israel-time.outputs.run_checks == 'true'
        run: python -m unittest discover -s tests

      - name: Check channels and apply safe fixes
        if: steps.israel-time.outputs.run_checks == 'true'
        run: |
          python tools/check_channels.py \
            --apply-fallbacks \
            --apply-candidates \
            --report-json channel-health-report.json \
            --report-markdown channel-health-report.md

      - name: Upload health report
        if: steps.israel-time.outputs.run_checks == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: channel-health-report
          path: |
            channel-health-report.json
            channel-health-report.md

      - name: Create pull request for safe metadata changes
        if: steps.israel-time.outputs.run_checks == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: codex/channel-health-maintenance
          delete-branch: true
          title: "Update channel fallbacks from daily health check"
          commit-message: "Update channel fallbacks from health check"
          body-path: channel-health-report.md
          labels: channel-health, automated

      - name: Open issue when broken sources remain
        if: always() && steps.israel-time.outputs.run_checks == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python tools/check_channels.py \
            --dry-run \
            --report-json channel-health-issue-report.json \
            --report-markdown channel-health-issue-report.md || true
          python - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          report = json.loads(Path("channel-health-issue-report.json").read_text(encoding="utf-8"))
          broken = [source for source in report.get("sources", []) if not source.get("ok")]
          if not broken:
              raise SystemExit(0)

          title = "Daily channel health: replacement search needed"
          body = Path("channel-health-issue-report.md").read_text(encoding="utf-8")
          existing = subprocess.run(
              ["gh", "issue", "list", "--state", "open", "--label", "channel-health", "--search", title, "--json", "number", "--jq", ".[0].number"],
              text=True,
              capture_output=True,
              check=False,
          ).stdout.strip()
          if existing:
              subprocess.run(["gh", "issue", "comment", existing, "--body", body], check=True)
          else:
              subprocess.run(["gh", "issue", "create", "--title", title, "--body", body, "--label", "channel-health"], check=True)
          PY

      - name: Prepare email summary
        if: always() && steps.israel-time.outputs.run_checks == 'true'
        id: email-summary
        env:
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          github_output = Path(os.environ["GITHUB_OUTPUT"])
          report_path = Path("channel-health-report.json")
          if not report_path.exists():
              body = (
                  "The daily channel maintenance workflow did not produce a health report. "
                  "Check the GitHub Actions run logs for the crash or test failure.\n"
              )
              Path("channel-health-email.txt").write_text(body, encoding="utf-8")
              Path("channel-health-report.md").write_text(body, encoding="utf-8")
              Path("channel-health-report.json").write_text("{}\n", encoding="utf-8")
              with github_output.open("a", encoding="utf-8") as handle:
                  handle.write("should_email=true\n")
                  handle.write("subject=Israeli Live TV Stable: maintenance workflow problem\n")
                  handle.write("body<<EMAIL_BODY\n")
                  handle.write(body)
                  handle.write("EMAIL_BODY\n")
              raise SystemExit(0)

          report = json.loads(report_path.read_text(encoding="utf-8"))
          broken = [source for source in report.get("sources", []) if not source.get("ok")]
          promoted = [channel for channel in report.get("channels", []) if channel.get("fallback_promoted")]
          candidates = report.get("candidates", [])
          keshet12 = report.get("keshet12") or {}
          changed = bool(report.get("changed"))
          keshet12_attention = bool(keshet12 and (not keshet12.get("checked") or keshet12.get("replacement_search_needed") or keshet12.get("fallback_promoted") or keshet12.get("all_sources_broken")))
          should_email = bool(broken or promoted or candidates or changed or keshet12_attention)

          lines = [
              "Daily Israeli Live TV Stable channel maintenance report.",
              "",
              f"Checked at: {report.get('checked_at', '-')}",
              f"Broken sources detected: {len(broken)}",
              f"Safe metadata changes prepared: {'yes' if changed else 'no'}",
              f"Channel 12 status: {keshet12.get('primary_status', '-') if keshet12 else '-'}",
              "",
              "What was done:",
          ]
          if promoted:
              for channel in promoted:
                  lines.append(f"- Promoted a working fallback for {channel.get('channel_name')} ({channel.get('channel_id')}).")
          if candidates:
              for candidate in candidates:
                  lines.append(
                      f"- Candidate {candidate.get('source_id')} for {candidate.get('channel_id')}: "
                      f"{candidate.get('status')} - {candidate.get('message')}"
                  )
          if keshet12:
              lines.append(
                  "- Channel 12 checked: "
                  f"working={keshet12.get('working_source_count', 0)}, "
                  f"broken={keshet12.get('broken_source_count', 0)}, "
                  f"repair_attempted={'yes' if keshet12.get('repair_attempted') else 'no'}."
              )
              for action in keshet12.get("repair_actions") or []:
                  lines.append(f"- Channel 12 repair action: {action}")
          if broken:
              lines.append("- Opened or updated a GitHub issue/report for remaining broken sources.")
          if os.environ.get("PR_URL"):
              lines.append(f"- Pull request: {os.environ['PR_URL']}")
          if not promoted and not candidates and not changed and broken:
              lines.append("- No safe automatic fix was available; replacement search is still needed.")
          if not should_email:
              lines.append("- No broken sources or maintenance changes were detected.")

          if broken:
              lines.extend(["", "Broken sources:"])
              for source in broken:
                  lines.append(f"- {source.get('channel_id')} / {source.get('source_id')}: {source.get('status')}")

          body = "\n".join(lines) + "\n"
          Path("channel-health-email.txt").write_text(body, encoding="utf-8")
          subject = "Israeli Live TV Stable: break detected" if broken else "Israeli Live TV Stable: maintenance update"
          with github_output.open("a", encoding="utf-8") as handle:
              handle.write(f"should_email={'true' if should_email else 'false'}\n")
              handle.write(f"subject={subject}\n")
              handle.write("body<<EMAIL_BODY\n")
              handle.write(body)
              handle.write("EMAIL_BODY\n")
          PY

      - name: Email health alert
        if: always() && env.MAIL_CONFIGURED == 'true' && steps.email-summary.outputs.should_email == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: ${{ steps.email-summary.outputs.subject }}
          to: nird.daus62@gmail.com
          from: ${{ secrets.MAIL_FROM }}
          body: ${{ steps.email-summary.outputs.body }}
          attachments: channel-health-report.md,channel-health-report.json

      - name: Email workflow crash
        if: failure() && env.MAIL_CONFIGURED == 'true' && steps.email-summary.outputs.should_email != 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Israeli Live TV Stable: maintenance workflow failed"
          to: nird.daus62@gmail.com
          from: ${{ secrets.MAIL_FROM }}
          body: "The daily channel maintenance workflow crashed or a required step failed before a normal health email could be prepared. Open the latest GitHub Actions run for details."
